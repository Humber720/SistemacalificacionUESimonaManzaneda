<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Educación Musical</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- ENCABEZADO -->
    <header>
        <h2>UNIDAD EDUCATIVA "SIMONA MANZANEDA"</h2>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="container">
        
        <div class="login-box">
            <h3>Ingreso a Notas</h3>
            <h1>Educación Musical</h1>

            <!-- MENSAJE INFORMATIVO -->
            <p class="info">
                Ingrese su número de carnet en ambos campos
            </p>

            <form id="loginForm">

                <!-- USUARIO = CI -->
                <label for="username">Número de Carnet (Usuario)</label>
                <div class="input-container">
                    <input 
                        type="number" 
                        id="username" 
                        name="username" 
                        placeholder="Ej: 1234567"
                        required
                    >
                </div>

                <!-- CONTRASEÑA = CI -->
                <label for="password">Número de Carnet (Contraseña)</label>
                <div class="input-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Repita su C.I."
                        required
                    >

                    <!-- BOTÓN OJITO -->
                    <span class="toggle" onclick="togglePasswordVisibility()">
                        
                        <!-- OJO ABIERTO -->
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" 
                            width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>

                        <!-- OJO CERRADO -->
                        <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg" 
                            width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display:none;">
                            <path d="M17.94 17.94A10.94 10.94 0 0112 20C5 20 1 12 1 12a21.77 21.77 0 015.06-6.94"/>
                            <path d="M1 1l22 22"/>
                        </svg>

                    </span>
                </div>

                <!-- BOTÓN -->
                <button type="submit">Ingresar</button>

                <!-- MENSAJE -->
                <p id="mensaje"></p>
            </form>
        </div>
    </div>

    <!-- PIE -->
    <footer>
        <p>&copy; Prof. Humberto Yupanqui C.</p>
    </footer>
   
    <script src="menu.js"></script>

</body>
</html>
